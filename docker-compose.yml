services:
  lightrag:
    container_name: lightrag
    image: ghcr.io/hkuds/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - ghcr.io/hkuds/lightrag:latest
    ports:
      - "${PORT:-9621}:9621"
    volumes:
      # ON UTILISE LES CHEMINS ABSOLUS DU VPS VERS LES CHEMINS INTERNES DU CONTENEUR
      - /app/data/rag_storage:/app/rag_storage
      - /app/data/inputs:/app/inputs
      - /app/config.ini:/app/config.ini
      - /app/.env:/app/.env
    env_file:
      - /app/.env
    environment:
      # VARIABLES D'ENVIRONNEMENT FIXES DANS LE CONTENEUR
      - WORKING_DIR=/app/rag_storage
      - INPUT_DIR=/app/inputs
      - WORKSPACE=default
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
