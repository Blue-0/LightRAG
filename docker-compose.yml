services:
  lightrag:
    container_name: lightrag
    image: ghcr.io/hkuds/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - ghcr.io/hkuds/lightrag:latest
    ports:
      - "${PORT:-9621}:9621"
    volumes:
      # On utilise des VOLUMES NOMMÉS (qui persistent aux redémarrages de Dokploy)
      - lightrag_data:/app/data/rag_storage
      - lightrag_inputs:/app/data/inputs
      # Les fichiers configs peuvent rester bindés si vous les éditez manuellement
      - /app/config.ini:/app/config.ini
      - /app/.env:/app/.env
    env_file:
      - .env
    environment:
      - WORKING_DIR=/app/data/rag_storage
      - INPUT_DIR=/app/data/inputs
      - WORKSPACE=default
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ON DÉCLARE LES VOLUMES NOMMÉS ICI
    volumes:
      lightrag_data:
      lightrag_inputs:
