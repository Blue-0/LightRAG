services:
  lightrag:
    container_name: lightrag
    image: ghcr.io/hkuds/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - ghcr.io/hkuds/lightrag:latest
    ports:
      - "${PORT:-9621}:9621"
    volumes:
      # Syntaxe Swarm/Dokploy obligatoire pour les montages physiques locaux
      - type: bind
        source: /app/data/rag_storage
        target: /app/data/rag_storage
      - type: bind
        source: /app/data/inputs
        target: /app/data/inputs
      - type: bind
        source: /app/config.ini
        target: /app/config.ini
      - type: bind
        source: /app/.env
        target: /app/.env
    env_file:
      - .env
    environment:
      - WORKING_DIR=/app/data/rag_storage
      - INPUT_DIR=/app/data/inputs
      - WORKSPACE=default
    # Dokploy / Swarm a besoin de l'instruction de déploiement pour la persistance locale
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    extra_hosts:
      - "host.docker.internal:host-gateway"
